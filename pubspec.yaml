name: ggc_win
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  lottie: ^3.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # ✨ NAYA: App Icon change karne wala package
  flutter_launcher_icons: ^0.13.1 

flutter:
  uses-material-design: true

  # ✨ NAYA: Assets folder enable kar diya taake images load ho sakein
  assets:
    - assets/

# ✨ NAYA: Jackpot Logo (App Icon) ki Settings
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21